<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ProfitHub Mining</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-bg"></div>
    <div class="app-shell">
      <header class="top-header">
        <h1>ProfitHub</h1>
      </header>

      <section class="status-bar">
        <div class="status-left">
          <button class="chip ghost">☰</button>
          <button class="chip">🇬🇧</button>
        </div>
        <div class="status-right">
          <div class="balance-chip">
            <span class="coin">🪙</span>
            <span id="balanceValue">0.058024</span>
          </div>
          <button id="quickDeposit" class="plus-btn">＋</button>
        </div>
      </section>

      <main id="viewContainer" class="view-container"></main>

      <nav class="bottom-nav">
        <button class="nav-item active" data-tab="power">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="4" width="7" height="7" rx="1.5"></rect>
              <rect x="14" y="4" width="7" height="7" rx="1.5"></rect>
              <rect x="3" y="13" width="7" height="7" rx="1.5"></rect>
              <rect x="14" y="13" width="7" height="7" rx="1.5"></rect>
            </svg>
          </span>
          <span class="nav-label">Power</span>
        </button>
        <button class="nav-item" data-tab="earn">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="8" cy="8" r="3"></circle>
              <circle cx="16.5" cy="9" r="2.5"></circle>
              <path d="M3 18c0-2.8 2.2-5 5-5s5 2.2 5 5"></path>
              <path d="M13 18c0-2 1.6-3.5 3.5-3.5S20 16 20 18"></path>
            </svg>
          </span>
          <span class="nav-label">Earn</span>
        </button>
        <button class="nav-item" data-tab="miner">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3.2"></circle>
              <path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a2 2 0 1 1-4 0v-.1a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4a2 2 0 1 1 0-4h.1a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1 1 0 0 0 1.1.2 1 1 0 0 0 .6-.9V4a2 2 0 1 1 4 0v.1a1 1 0 0 0 .6.9 1 1 0 0 0 1.1-.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1 1 0 0 0-.2 1.1 1 1 0 0 0 .9.6h.1a2 2 0 1 1 0 4h-.1a1 1 0 0 0-.9.6z"></path>
            </svg>
          </span>
          <span class="nav-label">Miner</span>
        </button>
        <button class="nav-item" data-tab="withdraw">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M3 8.5A2.5 2.5 0 0 1 5.5 6h10A2.5 2.5 0 0 1 18 8.5V9h1.5A1.5 1.5 0 0 1 21 10.5v6a1.5 1.5 0 0 1-1.5 1.5H18v.5a2.5 2.5 0 0 1-2.5 2.5h-10A2.5 2.5 0 0 1 3 18.5v-10z"></path>
              <circle cx="17" cy="13.5" r="1.4"></circle>
            </svg>
          </span>
          <span class="nav-label">Withdraw</span>
        </button>
        <button class="nav-item" data-tab="tasks">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="5" y="3" width="14" height="18" rx="2"></rect>
              <path d="M9 8h6M9 12h6M9 16h4"></path>
            </svg>
          </span>
          <span class="nav-label">Tasks</span>
        </button>
      </nav>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
