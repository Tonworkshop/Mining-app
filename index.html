<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ProfitHub Mining</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-bg"></div>
    <div class="app-shell">
      <header class="top-header">
        <button class="icon-btn" aria-label="Close">✕</button>
        <h1>ProfitHub</h1>
        <div class="top-actions">
          <button class="icon-btn" aria-label="Collapse">⌄</button>
          <button class="icon-btn" aria-label="Menu">⋮</button>
        </div>
      </header>

      <section class="status-bar">
        <div class="status-left">
          <button class="chip ghost">☰</button>
          <button class="chip">🇬🇧</button>
        </div>
        <div class="status-right">
          <div class="balance-chip">
            <span class="coin">🪙</span>
            <span id="balanceValue">0.058024</span>
          </div>
          <button id="quickDeposit" class="plus-btn">＋</button>
        </div>
      </section>

      <main id="viewContainer" class="view-container"></main>

      <nav class="bottom-nav">
        <button class="nav-item active" data-tab="power">
          <span class="nav-icon">▦</span>
          <span class="nav-label">Power</span>
        </button>
        <button class="nav-item" data-tab="earn">
          <span class="nav-icon">👥</span>
          <span class="nav-label">Earn</span>
        </button>
        <button class="nav-item" data-tab="miner">
          <span class="nav-icon">⚙</span>
          <span class="nav-label">Miner</span>
        </button>
        <button class="nav-item" data-tab="withdraw">
          <span class="nav-icon">👛</span>
          <span class="nav-label">Withdraw</span>
        </button>
        <button class="nav-item" data-tab="tasks">
          <span class="nav-icon">🧾</span>
          <span class="nav-label">Tasks</span>
        </button>
      </nav>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
